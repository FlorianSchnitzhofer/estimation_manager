services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: estimation_manager
      POSTGRES_USER: em
      POSTGRES_PASSWORD: em_local_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U em -d estimation_manager"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://em:em_local_dev@db:5432/estimation_manager
      AUTO_LOGIN_USER: florian@bingro.com
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build: ./frontend
    environment:
      API_UPSTREAM: http://api:8000
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
